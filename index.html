<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polla Mundial 2026 — 8vos</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }
header { background: #000; color: white; padding: 1rem 1rem 0; }
.header-inner { display: flex; align-items: center; gap: 12px; max-width: 480px; margin: 0 auto; }
.header-logo { height: 48px; border-radius: 8px; }
.header-text h1 { font-size: 18px; font-weight: 700; }
.header-text p { font-size: 11px; opacity: 0.6; }
.tabs { display: flex; justify-content: center; margin-top: 0.75rem; }
.tab { padding: 10px 24px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.55); cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; }
.tab.active { color: #fff; border-bottom: 3px solid #e94560; }
.panel { display: none; padding: 1rem; max-width: 480px; margin: 0 auto; }
.panel.active { display: block; }
.banner { background: linear-gradient(135deg, #1a1a2e, #0f3460); color: white; text-align: center; padding: 1.25rem 1rem; margin: 1rem 0; border-radius: 16px; }
.banner .trofeo { font-size: 44px; margin-bottom: 4px; }
.banner h2 { font-size: 16px; font-weight: 700; color: #f0c040; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.banner .sub { font-size: 12px; opacity: 0.65; margin-bottom: 0.75rem; }
.banner .chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
.banner .chip { background: #f0c040; color: #1a1a2e; font-weight: 700; font-size: 14px; padding: 7px 16px; border-radius: 99px; }
.played-info { background: white; border-radius: 12px; padding: 10px 14px; margin: 1rem 0 0.5rem; font-size: 13px; color: #555; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.played-info strong { color: #0f3460; font-size: 15px; }
.section-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
.standing-card { background: white; border-radius: 16px; padding: 1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
.gold { border-left: 4px solid #f0c040; }
.silver { border-left: 4px solid #b0b0b0; }
.bronze { border-left: 4px solid #cd7f32; }
.rest { border-left: 4px solid #e0e0e0; }
.rank-medal { font-size: 22px; min-width: 30px; text-align: center; }
.standing-info { flex: 1; }
.standing-name { font-size: 15px; font-weight: 700; color: #1a1a2e; }
.standing-sub { font-size: 12px; color: #888; margin-top: 2px; }
.progress-bar { height: 4px; background: #eee; border-radius: 2px; margin-top: 6px; }
.progress-fill { height: 4px; border-radius: 2px; background: linear-gradient(90deg, #0f3460, #e94560); }
.pts-num { font-size: 28px; font-weight: 800; color: #0f3460; line-height: 1; text-align: right; }
.pts-label { font-size: 11px; color: #aaa; text-align: right; }
.date-label { font-size: 11px; font-weight: 700; color: #0f3460; text-transform: uppercase; letter-spacing: 0.08em; margin: 1.25rem 0 0.5rem; padding-bottom: 4px; border-bottom: 2px solid #e94560; }
.match-card { background: white; border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
.match-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.match-num { font-size: 11px; color: #bbb; font-weight: 600; min-width: 18px; }
.match-title { flex: 1; font-size: 14px; font-weight: 700; color: #1a1a2e; }
.result-pill { font-size: 11px; padding: 3px 10px; border-radius: 99px; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
.pending-pill { font-size: 11px; padding: 3px 10px; border-radius: 99px; background: #f0f0f0; color: #999; }
.preds-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
.pred-row { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 8px; }
.correct { background: #e8f5e9; }
.wrong { background: #fce4ec; }
.pred-pname { font-size: 12px; font-weight: 600; color: #555; min-width: 52px; }
.pred-team { font-size: 12px; color: #333; flex: 1; }
.correct .pred-team { color: #2e7d32; font-weight: 600; }
.wrong .pred-team { color: #c62828; text-decoration: line-through; opacity: 0.8; }
.footer { text-align: center; padding: 2rem 1rem; font-size: 11px; color: #aaa; }
</style>
</head>

  </div>

</header>
<div class="panel active" id="tab-clasificacion"></div>
<div class="panel" id="tab-partidos"></div>
<div class="footer">Polla familiar · Copa Mundial FIFA 2026 · 8vos de final</div>

<script>
const MATCHES = [
  { id:1, home:'Paraguay',       away:'Francia',    date:'5 jul' },
  { id:2, home:'Canadá',         away:'Marruecos',  date:'5 jul' },
  { id:3, home:'Portugal',       away:'España',     date:'6 jul' },
  { id:4, home:'Estados Unidos', away:'Bélgica',    date:'6 jul' },
  { id:5, home:'Brasil',         away:'Noruega',    date:'7 jul' },
  { id:6, home:'México',         away:'Inglaterra', date:'7 jul' },
  { id:7, home:'Argentina',      away:'Egipto',     date:'8 jul' },
  { id:8, home:'Suiza',          away:'Colombia',   date:'8 jul' },
];

const PARTICIPANTS = ['Jeanet','Víctor','Eli','Jaci','Jenny/Cari','Jacqui'];

const PREDICTIONS = {
  'Jeanet':     {1:'Francia',2:'Marruecos',3:'España',  4:'Estados Unidos',5:'Brasil',6:'Inglaterra',7:'Argentina',8:'Colombia'},
  'Víctor':     {1:'Francia',2:'Marruecos',3:'España',  4:'Bélgica',       5:'Brasil',6:'Inglaterra',7:'Argentina',8:'Colombia'},
  'Eli':        {1:'Francia',2:'Marruecos',3:'España',  4:'Estados Unidos',5:'Brasil',6:'México',    7:'Argentina',8:'Colombia'},
  'Jaci':       {1:'Francia',2:'Marruecos',3:'Portugal',4:'Estados Unidos',5:'Brasil',6:'México',    7:'Argentina',8:'Colombia'},
  'Jenny/Cari': {1:'Francia',2:'Marruecos',3:'España',  4:'Estados Unidos',5:'Brasil',6:'México',    7:'Argentina',8:'Colombia'},
  'Jacqui':     {1:'Francia',2:'Marruecos',3:'España',  4:'Estados Unidos',5:'Brasil',6:'México',    7:'Argentina',8:'Colombia'},
};

let RESULTS = {};

function calcPts(name) {
  return MATCHES.filter(m => RESULTS[m.id] && PREDICTIONS[name][m.id] === RESULTS[m.id]).length;
}

function render() {
  const played = Object.keys(RESULTS).length;
  const rows = PARTICIPANTS.map(n => ({name:n, pts:calcPts(n)})).sort((a,b) => b.pts-a.pts);
  const maxPts = Math.max(...rows.map(r=>r.pts), 1);
  const medals = ['🥇','🥈','🥉'];
  const clss = ['gold','silver','bronze'];
  const getRank = i => rows.findIndex(r => r.pts === rows[i].pts);

  let bannerHTML = '';
  if (played >= 8) {
    const top = rows[0].pts;
    const ganadores = rows.filter(r => r.pts === top);
    bannerHTML = `<div class="banner">
      <div class="trofeo">🏆</div>
      <h2>${ganadores.length>1?'¡Empate en el primer lugar!':'¡Ganador de la polla!'}</h2>
      <div class="sub">${top} puntos de 8 partidos</div>
      <div class="chips">${ganadores.map(g=>`<div class="chip">🥇 ${g.name}</div>`).join('')}</div>
    </div>`;
  }

  document.getElementById('tab-clasificacion').innerHTML = `
    ${bannerHTML}
    <div class="played-info">Partidos jugados: <strong>${played} / 8</strong></div>
    <div class="section-title">Tabla de posiciones</div>
    ${rows.map((p,i) => {
      const r = getRank(i);
      const pct = Math.round(p.pts/maxPts*100);
      const aciertos = MATCHES.filter(m => RESULTS[m.id] && PREDICTIONS[p.name][m.id]===RESULTS[m.id]).length;
      return `<div class="standing-card ${clss[r]||'rest'}">
        <div class="rank-medal">${medals[r]||`<span style="font-size:13px;color:#aaa">${r+1}</span>`}</div>
        <div class="standing-info">
          <div class="standing-name">${p.name}</div>
          <div class="standing-sub">${aciertos} acierto${aciertos!==1?'s':''} de ${played} partido${played!==1?'s':''}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div><div class="pts-num">${p.pts}</div><div class="pts-label">pts</div></div>
      </div>`;
    }).join('')}`;

  const byDate = {};
  MATCHES.forEach(m => { if(!byDate[m.date]) byDate[m.date]=[]; byDate[m.date].push(m); });
  document.getElementById('tab-partidos').innerHTML = ['Sáb 4 jul','Dom 5 jul','Lun 6 jul','Mar 7 jul'].filter(d=>byDate[d]).map(date=>`
    <div class="date-label">📅 ${date}</div>
    ${byDate[date].map(m=>{
      const winner=RESULTS[m.id];
      return `<div class="match-card">
        <div class="match-top">
          <span class="match-num">${m.id}</span>
          <span class="match-title">${m.flag_h} ${m.home} vs ${m.flag_a} ${m.away}</span>
          ${winner?`<span class="result-pill">✓ ${winner}</span>`:`<span class="pending-pill">⏳ pendiente</span>`}
        </div>
        <div class="preds-grid">
          ${PARTICIPANTS.map(name=>{
            const pred=PREDICTIONS[name][m.id];
            let rc='',icon='';
            if(winner){rc=pred===winner?'correct':'wrong';icon=pred===winner?'✓':'✗';}
            return `<div class="pred-row ${rc}"><span class="pred-pname">${name}</span><span class="pred-team">${pred}</span>${icon?`<span style="font-size:12px">${icon}</span>`:''}</div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  `).join('');
}

function switchTab(name,e) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// Cargar resultados.json y actualizar cada 5 min
function loadResults() {
  fetch('resultados8vos.json?nocache=' + Date.now())
    .then(r => r.json())
    .then(data => {
      RESULTS = {};
      MATCHES.forEach(m => {
        const key = m.home + '|' + m.away;
        if (data[key]) RESULTS[m.id] = data[key];
      });
      render();
    })
    .catch(() => render()); // si falla igual renderiza vacío
}

loadResults();
setInterval(loadResults, 5 * 60 * 1000);
</script>
</body>
</html>
