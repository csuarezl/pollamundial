name: Actualizar resultados Mundial

on:
  schedule:
    - cron: "0 * * * *"   # cada hora, en punto (UTC)
  workflow_dispatch:        # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Consultar resultados y generar JSON
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python update_results.py

      - name: Subir cambios si hay resultados nuevos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resultados.json
          git diff --quiet --cached || git commit -m "Actualizar resultados automáticamente"
          git push
